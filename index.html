<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HRRR 10065">
<title>HRRR · 10065</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    color: #e6edf7;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }
  body {
    padding-right: env(safe-area-inset-right);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    min-height: 100vh;
  }
  header {
    text-align: center;
    padding: calc(14px + env(safe-area-inset-top)) 12px 10px;
    position: sticky;
    top: 0;
    background: rgba(0,0,0,0.88);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    z-index: 10;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .loc {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .upd {
    font-size: 11px;
    color: #8aa0bf;
    margin-top: 3px;
    letter-spacing: 0.04em;
  }
  main {
    padding: 0 6px 24px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }
  th, td {
    padding: 10px 2px;
    text-align: center;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    vertical-align: middle;
  }
  /* Sticky offsets — main header height (~55px + safe-area), then thead (~34px) */
  :root {
    --header-h: calc(55px + env(safe-area-inset-top));
    --thead-h:  34px;
  }
  thead th {
    color: #8aa0bf;
    font-size: 10.5px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 14px 2px 8px;
    background: #000;
    position: sticky;
    top: var(--header-h);
    z-index: 8;
  }
  th.tap {
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
    text-decoration: underline dotted rgba(255,255,255,0.25);
    text-underline-offset: 3px;
  }
  th.tap:active { color: #cbd5e1; }
  col.c-hour { width: 22%; }
  col.c-temp { width: 20%; }
  col.c-sky  { width: 18%; }
  col.c-rain { width: 14%; }
  col.c-wind { width: 26%; }
  .cell-hour { font-size: 13px; line-height: 1.1; }
  .cell-temp { font-size: 24px; font-weight: 700; line-height: 1; }
  .cell-sky  { padding: 6px 2px; }
  .cell-sky svg { width: 40px; height: 40px; display: inline-block; vertical-align: middle; overflow: visible; }
  .cell-rain {
    font-size: 15px;
    font-variant-numeric: tabular-nums;
    -webkit-touch-callout: none;   /* suppress iOS callout on long-press */
    -webkit-user-select: none;
    user-select: none;
  }
  /* Rain number color is set inline per-cell: cyan (ensemble agrees) →
     green (wide ensemble spread). See spreadColor() in script. */

  /* Long-press readout: pinned top-center, far from a thumb on a table row */
  #rainInfo {
    position: fixed;
    top: calc(env(safe-area-inset-top) + 64px);
    /* Left-anchored so it sits over the hour/temp columns — clear of a thumb
       pressing the rainfall number (center-right), even on the top rows. */
    left: 10px;
    background: #16213d;
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 12px;
    padding: 9px 14px;
    font-size: 14px;
    font-variant-numeric: tabular-nums;
    line-height: 1.4;
    text-align: left;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    z-index: 50;
    display: none;
    pointer-events: none;
    white-space: nowrap;
  }
  #rainInfo .ri-grid > div, #rainInfo .ri-blend {
    display: flex;
    justify-content: space-between;
    gap: 18px;
  }
  #rainInfo b { font-weight: 600; color: #8aa0bf; }
  #rainInfo span { color: #e6edf7; }
  #rainInfo .ri-blend {
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px solid rgba(255,255,255,0.15);
  }
  #rainInfo .ri-blend b { color: #cbd5e1; }
  #rainInfo .ri-blend span { color: #38bdf8; font-weight: 700; }
  .cell-wind { padding: 4px 2px; }
  .cell-wind svg { width: 48px; height: 48px; display: inline-block; vertical-align: middle; }

  tr.now { background: rgba(96,165,250,0.07); }
  tr.now .cell-hour { color: #60a5fa; font-weight: 700; }

  tr.day-divider td {
    padding: 12px 12px 10px;
    text-align: center;
    /* solid bg so content scrolling underneath the sticky divider doesn't show through */
    background: #0c0c0c;
    color: #cbd5e1;
    font-size: 11.5px;
    font-weight: 600;
    letter-spacing: 0.14em;
    border-top: 1px solid rgba(255,255,255,0.1);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    position: sticky;
    top: calc(var(--header-h) + var(--thead-h));
    z-index: 6;
  }
  tr.day-divider.today td { color: #60a5fa; }

  .status {
    text-align: center;
    color: #8aa0bf;
    padding: 64px 16px;
    font-size: 14px;
  }
  .status.err { color: #f87171; }

  /* ===================== Radar map ===================== */
  /* Round radar button, top-right of the (centered, sticky) header. */
  #radarBtn {
    position: absolute;
    top: calc(env(safe-area-inset-top) + 12px);
    right: 14px;
    width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    padding: 0;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 50%;
    color: #cbd5e1;
    cursor: pointer;
  }
  #radarBtn:active { background: rgba(255,255,255,0.18); }
  #radarBtn svg { width: 22px; height: 22px; display: block; }

  /* Full-screen radar overlay (hidden until opened). */
  #radarView { display: none; position: fixed; inset: 0; z-index: 1000; background: #000; }
  #radarView.open { display: block; }
  #radarMap { position: absolute; inset: 0; width: 100%; height: 100%; background: #0b0b0f; }
  #radarClose {
    position: absolute; z-index: 1002;
    top: calc(env(safe-area-inset-top) + 12px);
    right: calc(env(safe-area-inset-right) + 12px);
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff; font-size: 20px; line-height: 1; cursor: pointer;
    -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
  }
  /* 20-minute precip-motion arrow, pinned bottom-right. */
  #radarArrow {
    position: absolute; z-index: 1001;
    inset: 0; width: 100%; height: 100%;
    pointer-events: none; display: none;
    /* Soft white glow = legible over radar without a hard outline that would
       blunt the sharp tip. */
    filter: drop-shadow(0 0 1px rgba(255,255,255,0.95)) drop-shadow(0 0 1px rgba(255,255,255,0.95));
  }
  /* Status pill (loading / no-precip), shares the bottom-right corner. */
  #radarMsg {
    position: absolute; z-index: 1001;
    right: calc(env(safe-area-inset-right) + 14px);
    bottom: calc(env(safe-area-inset-bottom) + 18px);
    max-width: 200px; text-align: right;
    font-size: 12px; font-weight: 600; color: #1f2937;
    background: rgba(255,255,255,0.82);
    border-radius: 8px; padding: 5px 9px;
    display: none;
  }
  /* Strip Leaflet chrome down to a faint attribution (licensing) in the corner
     away from the arrow. */
  #radarView .leaflet-control-attribution {
    font-size: 9px; background: rgba(255,255,255,0.55);
    color: #555; padding: 0 4px;
  }
  #radarView .leaflet-control-attribution a { color: #555; }
</style>
</head>
<body>

<header>
  <div class="loc">HRRR · 10065 Upper East Side</div>
  <div class="upd" id="updated">Loading…</div>
  <button id="radarBtn" aria-label="Open radar map">
    <svg viewBox="0 0 24 24">
      <g fill="none" stroke="currentColor" stroke-width="1.6">
        <circle cx="12" cy="12" r="9"/>
        <circle cx="12" cy="12" r="5.5"/>
        <circle cx="12" cy="12" r="2"/>
      </g>
      <path d="M12 12 L20 7" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
    </svg>
  </button>
</header>

<main>
  <table id="table" style="display:none">
    <colgroup>
      <col class="c-hour"><col class="c-temp"><col class="c-sky"><col class="c-rain"><col class="c-wind">
    </colgroup>
    <thead>
      <tr><th>Hour</th><th id="tempHeader" class="tap" onclick="toggleTempUnit()" aria-label="Toggle temperature units">Temp · °C</th><th>Sky</th><th>mm</th><th>Wind</th></tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
  <div class="status" id="status">Loading HRRR forecast…</div>
</main>

<div id="rainInfo"></div>

<div id="radarView">
  <div id="radarMap"></div>
  <svg id="radarArrow" viewBox="0 0 160 160" aria-hidden="true"></svg>
  <div id="radarMsg"></div>
  <button id="radarClose" aria-label="Close radar map">✕</button>
</div>

<script>
/* ===================== Config ===================== */
const COORDS = { lat: 40.7644, lon: -73.9594 };    // zip 10065 (UES)
const MANHATTAN_OFFSET = 29;                        // degrees E of true N
const REFRESH_MS = 15 * 60 * 1000;                  // 15 min
function buildUrl(model, hourly) {
  return 'https://api.open-meteo.com/v1/forecast' +
    `?latitude=${COORDS.lat}&longitude=${COORDS.lon}` +
    `&models=${model}&hourly=${hourly.join(',')}` +
    '&temperature_unit=celsius&wind_speed_unit=mph&precipitation_unit=mm' +
    '&timezone=America/New_York&forecast_hours=48';
}
const HRRR_URL = buildUrl('gfs_hrrr', [
  'temperature_2m','cloud_cover_low','cloud_cover_mid','cloud_cover_high',
  'precipitation','weather_code','wind_speed_10m','wind_direction_10m','is_day'
]);
// Precip ensemble: 5 independent globals fetched in one request; combined with
// HRRR (above) into a 6-model outlier-rejected mean. Backtested over 2–5 yrs vs
// the Central Park gauge — beats every 2-model approach on typical AND extreme
// days, and catches floods HRRR+GFS both miss. (GraphCast omitted: null live.)
const ENS_MODELS = [
  {id: 'gfs_global',   name: 'GFS'},
  {id: 'jma_gsm',      name: 'JMA'},
  {id: 'ecmwf_ifs025', name: 'ECMWF'},
  {id: 'icon_global',  name: 'ICON'},
  {id: 'gem_global',   name: 'GEM'},
];
const ENS_URL = buildUrl(ENS_MODELS.map(m => m.id).join(','), ['precipitation']);
const PRECIP_MIN = 0.15;  // mm: ensemble values below this render as nothing (hides trace/drizzle)

/* ===================== Cloud palette ===================== */
/* light → white front → medium (snow) → dark (overcast/storm) */
const CLOUD_LIGHT    = '#cbd5e1';   // few/partly clouds; back cloud of two-cloud "mostly"
const CLOUD_WHITE    = '#f1f5f9';   // front cloud of two-cloud "mostly" (near-white)
const CLOUD_MEDIUM   = '#64748b';   // snow-light / snow-mod
const CLOUD_DARK     = '#475569';   // overcast, thunderstorm, snow-heavy (mid-dark grey)

/* ===================== Icon primitives ===================== */
const SUN = `
  <g stroke="#fbbf24" stroke-width="3" stroke-linecap="round" fill="none">
    <line x1="32" y1="4"  x2="32" y2="12"/>
    <line x1="32" y1="52" x2="32" y2="60"/>
    <line x1="4"  y1="32" x2="12" y2="32"/>
    <line x1="52" y1="32" x2="60" y2="32"/>
    <line x1="12" y1="12" x2="18" y2="18"/>
    <line x1="46" y1="46" x2="52" y2="52"/>
    <line x1="52" y1="12" x2="46" y2="18"/>
    <line x1="18" y1="46" x2="12" y2="52"/>
  </g>
  <circle cx="32" cy="32" r="11" fill="#fbbf24"/>`;

const MOON = `<path d="M44 14 a20 20 0 1 0 0 36 a16 16 0 1 1 0 -36 z" fill="#e2e8f0"/>`;

function cloud({cx=32, cy=36, s=1, fill=CLOUD_LIGHT} = {}) {
  const r1 = 9*s, r2 = 12*s, r3 = 10*s, r4 = 8*s;
  return `<g fill="${fill}">
    <circle cx="${cx - 12*s}" cy="${cy + 2*s}" r="${r1}"/>
    <circle cx="${cx}"        cy="${cy - 6*s}" r="${r2}"/>
    <circle cx="${cx + 12*s}" cy="${cy + 1*s}" r="${r3}"/>
    <circle cx="${cx + 1*s}"  cy="${cy + 6*s}" r="${r4}"/>
    <rect x="${cx - 18*s}" y="${cy}" width="${36*s}" height="${10*s}" rx="${4*s}"/>
  </g>`;
}

function rain({count=3, baseY=46} = {}) {
  const xs = [];
  const step = 32 / (count + 1);
  for (let i=1; i<=count; i++) xs.push(16 + step*i);
  return `<g stroke="#38bdf8" stroke-width="2.4" stroke-linecap="round">
    ${xs.map((x,i)=>{
      const y1 = baseY + (i%2 ? 0 : 3);
      const y2 = y1 + 8;
      return `<line x1="${x}" y1="${y1}" x2="${x-2}" y2="${y2}"/>`;
    }).join('')}
  </g>`;
}

// 6-point asterisk snowflakes — distinct from rain's angled lines
function snow({count=3, baseY=46} = {}) {
  const xs = [];
  const step = 32 / (count + 1);
  for (let i=1; i<=count; i++) xs.push(16 + step*i);
  return `<g stroke="#f1f5f9" stroke-width="1.3" stroke-linecap="round" fill="none">
    ${xs.map((x,i)=>{
      const y = baseY + 4 + (i%2 ? 0 : 3);
      return `<g transform="translate(${x},${y})">
        <line x1="-2.6" y1="0"     x2="2.6"  y2="0"/>
        <line x1="-1.3" y1="-2.25" x2="1.3"  y2="2.25"/>
        <line x1="-1.3" y1="2.25"  x2="1.3"  y2="-2.25"/>
      </g>`;
    }).join('')}
  </g>`;
}

// Fog: stacked horizontal mist bands, no cloud body
const FOG = `
  <g stroke="#cbd5e1" stroke-width="3" stroke-linecap="round" fill="none">
    <line x1="14" y1="14" x2="50" y2="14"/>
    <line x1="8"  y1="24" x2="56" y2="24"/>
    <line x1="12" y1="34" x2="52" y2="34"/>
    <line x1="8"  y1="44" x2="56" y2="44"/>
    <line x1="14" y1="54" x2="50" y2="54"/>
  </g>`;

// Lightning bolt — goes inside the thunderstorm cloud
const LIGHTNING = `
  <path d="M 33 36 L 26 50 L 31 50 L 26 62 L 39 47 L 33 47 L 37 36 Z"
        fill="#fbbf24" stroke="#f59e0b" stroke-width="0.6" stroke-linejoin="round"/>`;

/* wrap inner SVG fragments; dy lets us vertically center composite icons
   whose content bbox isn't naturally centered on the 0..64 viewBox */
const wrap = (inner, dy=0) =>
  `<svg viewBox="0 0 64 64">${dy ? `<g transform="translate(0,${dy})">${inner}</g>` : inner}</svg>`;

/* ===================== Icon catalog ===================== */
/* The second arg to wrap() is a vertical shift (in viewBox units) to put the
   content's bbox center at y=32. Values came from measured bboxes — composite
   icons that mix sun/moon and cloud are visually top-heavy without this. */

// Shared two-cloud body for the rain-bearing "mostly" variants
// (smaller + higher than the dry "mostly" pair to leave room for raindrops).
const TWO_CLOUD_RAIN = `${cloud({cx:20, cy:24, s:0.55})}${cloud({cx:42, cy:30, s:0.70, fill:CLOUD_WHITE})}`;

// Partly-cloudy bodies parameterized by sun-or-moon glyph (only diff between day/night).
const partlyBody     = (g) => `<g transform="translate(-2,-2) scale(0.7)">${g}</g>${cloud({cx:34, cy:36, s:0.95})}`;
const partlyRainBody = (g) => `<g transform="translate(-2,-4) scale(0.65)">${g}</g>${cloud({cx:34, cy:32, s:0.9})}${rain({count:2, baseY:46})}`;

const ICONS = {
  'clear-day':         wrap(SUN),
  'clear-night':       wrap(MOON),
  'few-day':           wrap(`<g transform="translate(-6,-6) scale(0.75)">${SUN}</g>${cloud({cx:40, cy:42, s:0.7})}`, 8),
  'few-night':         wrap(`<g transform="translate(-8,-6) scale(0.75)">${MOON}</g>${cloud({cx:40, cy:42, s:0.7})}`, 5),
  'partly-day':        wrap(partlyBody(SUN), 7),
  'partly-night':      wrap(partlyBody(MOON), 3),
  'mostly':            wrap(`${cloud({cx:22, cy:30, s:0.65})}${cloud({cx:42, cy:38, s:0.78, fill:CLOUD_WHITE})}`, -2),
  'overcast':          wrap(cloud({cx:32, cy:32, s:1.25, fill:CLOUD_DARK}), 3),
  'partly-rain-day':   wrap(partlyRainBody(SUN), 4),
  'partly-rain-night': wrap(partlyRainBody(MOON), 2),
  'mostly-light':      wrap(`${TWO_CLOUD_RAIN}${rain({count:3, baseY:44})}`, -3),
  'mostly-mod':        wrap(`${TWO_CLOUD_RAIN}${rain({count:5, baseY:42})}`, -2),
  'mostly-heavy':      wrap(`${TWO_CLOUD_RAIN}${rain({count:7, baseY:40})}`, -1),
  'overcast-light':    wrap(`${cloud({cx:32, cy:26, s:1.15, fill:CLOUD_DARK})}${rain({count:3, baseY:46})}`),
  'overcast-mod':      wrap(`${cloud({cx:32, cy:26, s:1.15, fill:CLOUD_DARK})}${rain({count:5, baseY:44})}`, 2),
  'overcast-heavy':    wrap(`${cloud({cx:32, cy:26, s:1.15, fill:CLOUD_DARK})}${rain({count:7, baseY:42})}`, 3),
  // snow: same cloud structure as rain, but snowflakes instead of raindrops
  'snow-light':        wrap(`${cloud({cx:32, cy:28, s:1.05, fill:CLOUD_MEDIUM})}${snow({count:3, baseY:46})}`),
  'snow-mod':          wrap(`${cloud({cx:32, cy:28, s:1.05, fill:CLOUD_MEDIUM})}${snow({count:5, baseY:44})}`),
  'snow-heavy':        wrap(`${cloud({cx:32, cy:26, s:1.15, fill:CLOUD_DARK})}${snow({count:7, baseY:42})}`, 4),
  'fog':               wrap(FOG, -2),
  'thunderstorm':      wrap(`${cloud({cx:32, cy:24, s:1.15, fill:CLOUD_DARK})}${LIGHTNING}`),
};

/* ===================== Classifiers ===================== */
/*
 * Perceptual cloud cover: how cloudy the sky LOOKS from the ground.
 *
 *   Opacity weights (fraction of sunlight each saturated layer blocks):
 *     Low  (cumulus, stratus, stratocumulus) → 1.0  opaque
 *     Mid  (altostratus, altocumulus)        → 0.8  dense but some light
 *     High (cirrus, cirrostratus)            → 0.25 wispy, lets sun through
 *
 *   Stacking: layers occlude *independently*, so we combine probabilistically
 *   instead of taking the max. With layers L,M,H of opacities oL,oM,oH and
 *   coverages cL,cM,cH ∈ [0,1], the chance any line-of-sight to the sun
 *   is clear ≈ (1 - cL·oL) · (1 - cM·oM) · (1 - cH·oH).
 *
 *   Overrides (sky FEEL beats raw % when these apply):
 *     • precipitation ≥ 0.1 mm/h  →  at least "mostly cloudy" (rain ⇒ dark sky)
 *     • precipitation ≥ 2.5 mm/h  →  at least "overcast"
 *     • weather_code 45 or 48 (fog) → at least "overcast"
 */
function effectiveCloud(low, mid, high, precip, wcode) {
  const probClear = (1 - low/100 * 1.00)
                  * (1 - mid/100 * 0.80)
                  * (1 - high/100 * 0.25);
  let eff = 100 * (1 - probClear);
  if (precip != null && precip >= 0.1) eff = Math.max(eff, 75);  // mostly
  if (precip != null && precip >= 2.5) eff = Math.max(eff, 90);  // overcast
  if (wcode === 45 || wcode === 48)    eff = Math.max(eff, 92);  // fog
  return eff;
}
function cloudBand(pct) {
  if (pct < 12) return 'clear';
  if (pct < 37) return 'few';
  if (pct < 62) return 'partly';
  if (pct < 87) return 'mostly';
  return 'overcast';
}
function rainBand(mm) {
  if (mm < 0.1) return 'dry';
  if (mm < 2.5) return 'light';
  if (mm < 7.6) return 'moderate';
  return 'heavy';
}
function pickIcon(cb, rb, isDay, wcode) {
  // Fog is a sky state independent of precip amount.
  if (wcode === 45 || wcode === 48) return 'fog';

  // Precip-TYPE overrides (snow / thunder) only apply when the synthesized
  // value is actually wet, so the icon agrees with the rainfall column.
  // Intensity follows the synthesized rain band, not the raw HRRR amount.
  if (rb !== 'dry') {
    if (wcode === 95 || wcode === 96 || wcode === 99) return 'thunderstorm';
    if (wcode === 71 || wcode === 73 || wcode === 75 ||
        wcode === 77 || wcode === 85 || wcode === 86)
      return rb === 'light' ? 'snow-light' : rb === 'moderate' ? 'snow-mod' : 'snow-heavy';
  }

  if (rb === 'dry') {
    if (cb === 'clear')    return isDay ? 'clear-day'   : 'clear-night';
    if (cb === 'few')      return isDay ? 'few-day'     : 'few-night';
    if (cb === 'partly')   return isDay ? 'partly-day'  : 'partly-night';
    if (cb === 'mostly')   return 'mostly';
    return 'overcast';
  }
  // wet (rain)
  if (cb === 'clear' || cb === 'few' || cb === 'partly') {
    if (rb === 'light')    return isDay ? 'partly-rain-day' : 'partly-rain-night';
    if (rb === 'moderate') return 'mostly-mod';
    return 'mostly-heavy';
  }
  if (cb === 'mostly') {
    if (rb === 'light')    return 'mostly-light';
    if (rb === 'moderate') return 'mostly-mod';
    return 'mostly-heavy';
  }
  if (rb === 'light')      return 'overcast-light';
  if (rb === 'moderate')   return 'overcast-mod';
  return 'overcast-heavy';
}

/* ===================== Wind icon ===================== */
function windIcon(fromDeg, mph) {
  const to = (fromDeg + 180) % 360;
  const display = ((to - MANHATTAN_OFFSET) + 360) % 360;
  // 8–15 mph: orange · >15 mph: red · else: default
  const numFill = mph > 15 ? '#ef4444' : (mph >= 8 ? '#fb923c' : '#e6edf7');
  return `
    <svg viewBox="0 0 64 64">
      <circle cx="32" cy="32" r="19" fill="none" stroke="#cbd5e1" stroke-width="2"/>
      <text x="32" y="37" text-anchor="middle" font-size="15" font-weight="700" fill="${numFill}">${mph}</text>
      <g transform="rotate(${display.toFixed(1)} 32 32)">
        <polygon points="32,4 27,14 37,14" fill="#cbd5e1"/>
      </g>
    </svg>`;
}

/* ===================== Precipitation synthesis ===================== */
/* Single value blending HRRR (convection-allowing, spiky) and GFS-global
   (smoother). Parameters were tuned by backtesting a FULL YEAR (365 days,
   121 wet) of historical gfs_hrrr + gfs_global forecasts against the Central
   Park rain gauge (GHCN USW00094728, ~2 km from 10065). The config below
   beats both raw models on MAE, RMSE and correlation (0.79 vs 0.66 HRRR /
   0.70 GFS).

   Outlier-rejected mean: among the models that have a value this hour, if the
   single highest is a wild outlier (> 2× the next-highest), drop it — this
   auto-kills uncorroborated convective spikes (e.g. HRRR 234 while all others
   say ~12 → 234 dropped). Otherwise average them all, which preserves floods
   every model agrees on AND rescues events that HRRR+GFS both miss but another
   model caught. Confidence is read from the ensemble SPREAD, not a 2-model
   comparison. */

/* Combine one hour's per-model values → {val, spread, members}.
   members keeps name/value pairs (incl. dropped/missing) for the long-press
   readout. spread is a coefficient of variation over the available values. */
function ensemble(members) {
  const have = members.filter(m => m.v != null).map(m => m.v);
  if (have.length === 0) return null;
  const mean = have.reduce((s, x) => s + x, 0) / have.length;
  let val = mean;
  if (have.length >= 3) {
    const s = [...have].sort((a, b) => a - b);
    const top = s[s.length - 1], second = s[s.length - 2];
    if (top > 2 * second + 1.0) {                 // wild outlier → drop it
      const rest = s.slice(0, -1);
      val = rest.reduce((p, x) => p + x, 0) / rest.length;
    }
  }
  // Trace/drizzle suppression is handled downstream by PRECIP_MIN: the outlier
  // rejection above already strips a lone overstater, so a true drizzle hour
  // falls below the floor on its own. (A previous count-based "dry consensus"
  // rule was removed — it mis-read broad light rain, where several models sit at
  // 0.2–0.5 mm, as minority drizzle and wrongly zeroed real rain.)
  const sd = Math.sqrt(have.reduce((p, x) => p + (x - mean) ** 2, 0) / have.length);
  const spread = mean > 0.2 ? sd / mean : 0;      // CV; undefined for ~dry
  return { val, spread, members };
}

/* Disagreement color: cyan (tight agreement) → green (wide spread), the green
   getting more intense with ensemble spread. Calm cyan for trivial amounts. */
function spreadColor(spread, val) {
  if (val < 2.5) return 'rgb(56,165,248)';        // cyan — not worth flagging
  // More sensitive: reaches full green by spread 0.7 (was 1.05).
  const t = Math.max(0, Math.min(1, (spread - 0.18) / (0.70 - 0.18)));
  const c0 = [56, 165, 248], c1 = [34, 197, 94];  // #38bdf8 → #22c55e
  const c = c0.map((v, i) => Math.round(v + (c1[i] - v) * t));
  return `rgb(${c[0]},${c[1]},${c[2]})`;
}

/* Renders the precip cell <td> from an ensemble result, colored by spread and
   carrying the per-model breakdown for the long-press readout. */
function rainTd(ens) {
  if (ens == null) return `<td class="cell-rain"></td>`;   // no model data at all
  const data = ens.members
    .map(m => `${m.name} ${m.v == null ? '—' : m.v.toFixed(1)}`).join('|');
  const attrs = `data-ens="${data}" data-val="${ens.val.toFixed(1)}"`;
  // Dry hours show no number but stay long-pressable, so all 6 model outputs
  // are still inspectable even when the blend rounds to nothing.
  if (ens.val < PRECIP_MIN) return `<td class="cell-rain" ${attrs}></td>`;
  const color = spreadColor(ens.spread, ens.val);
  return `<td class="cell-rain" ${attrs}>` +
         `<span style="color:${color}">${ens.val.toFixed(1)}</span></td>`;
}

/* ===================== Time ===================== */

function hourBand(date) {
  const start = date.getHours();
  const end   = (start + 1) % 24;
  const ap    = h => h < 12 ? 'a' : 'p';          // 0..11 = a, 12..23 = p
  const num   = h => (h === 0 || h === 12) ? 12 : h % 12;
  // Drop the first a/p when both ends share it (e.g. 1p–2p → 1–2p)
  return ap(start) === ap(end)
    ? `${num(start)}–${num(end)}${ap(end)}`
    : `${num(start)}${ap(start)}–${num(end)}${ap(end)}`;
}

function dayDividerLabel(date, isToday) {
  const md = date.toLocaleDateString('en-US', {month: 'short', day: 'numeric'}).toUpperCase();
  if (isToday) return `TODAY · ${md}`;
  const wk = date.toLocaleDateString('en-US', {weekday: 'long'}).toUpperCase();
  return `${wk} · ${md}`;
}

/* ===================== Temp unit ===================== */
let tempUnit = (typeof localStorage !== 'undefined' && localStorage.getItem('tempUnit')) || 'C';
function tempDisplay(c)   { return tempUnit === 'F' ? Math.round(c * 9/5 + 32) : Math.round(c); }
function updateTempHeader() {
  const el = document.getElementById('tempHeader');
  if (el) el.textContent = `Temp · °${tempUnit}`;
}
function toggleTempUnit() {
  tempUnit = tempUnit === 'C' ? 'F' : 'C';
  try { localStorage.setItem('tempUnit', tempUnit); } catch (e) {}
  updateTempHeader();
  if (lastData) render(lastData);
}

/* ===================== Render ===================== */
let lastData = null;        // cached so toggling temp unit doesn't re-fetch

async function refresh() {
  try {
    const [hRes, eRes] = await Promise.all([fetch(HRRR_URL), fetch(ENS_URL)]);
    if (!hRes.ok) throw new Error(`HRRR HTTP ${hRes.status}`);
    if (!eRes.ok) throw new Error(`ensemble HTTP ${eRes.status}`);
    const [hrrr, ens] = await Promise.all([hRes.json(), eRes.json()]);
    // Index each ensemble model's precip by time string for alignment.
    // ensByTime[time] = { GFS: 1.2, JMA: 0.0, ECMWF: 1.4, ... }
    const ensByTime = {};
    ens.hourly.time.forEach((t, i) => {
      const row = {};
      ENS_MODELS.forEach(m => { row[m.name] = ens.hourly['precipitation_' + m.id][i]; });
      ensByTime[t] = row;
    });
    lastData = { hrrr, ensByTime };
    render(lastData);
    updateHeader();
  } catch (err) {
    const s = document.getElementById('status');
    s.className = 'status err';
    s.style.display = '';
    s.textContent = `Couldn't load forecast: ${err.message}`;
    document.getElementById('table').style.display = 'none';
  }
}

function updateHeader() {
  const now = new Date();
  const t = now.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
  document.getElementById('updated').textContent = `Updated ${t} · 6-model rain blend`;
}

function render(data) {
  const tbody  = document.getElementById('rows');
  const table  = document.getElementById('table');
  const status = document.getElementById('status');

  tbody.innerHTML = '';
  const h     = data.hrrr.hourly;
  const times = h.time;
  const temp  = h.temperature_2m;
  const ccL   = h.cloud_cover_low;
  const ccM   = h.cloud_cover_mid;
  const ccH   = h.cloud_cover_high;
  const pr    = h.precipitation;
  const wc    = h.weather_code;
  const ws    = h.wind_speed_10m;
  const wd    = h.wind_direction_10m;
  const day   = h.is_day;
  const ensByTime = data.ensByTime || {};

  const now = new Date();
  const currentHourStart = new Date(now.getFullYear(), now.getMonth(), now.getDate(), now.getHours(), 0, 0);

  const todayKey = now.toDateString();
  let rowsShown = 0;
  let prevDateKey = null;
  for (let i = 0; i < times.length; i++) {
    const ts = new Date(times[i]);
    if (ts.getTime() < currentHourStart.getTime()) continue;
    if (temp[i] == null || ccL[i] == null || ccM[i] == null || ccH[i] == null ||
        pr[i] == null || ws[i] == null || wd[i] == null) continue;

    const dateKey = ts.toDateString();
    if (dateKey !== prevDateKey) {
      const isToday = dateKey === todayKey;
      const divider = document.createElement('tr');
      divider.className = isToday ? 'day-divider today' : 'day-divider';
      const cell = document.createElement('td');
      cell.colSpan = 5;
      cell.textContent = dayDividerLabel(ts, isToday);
      divider.appendChild(cell);
      tbody.appendChild(divider);
    }
    prevDateKey = dateKey;

    // The ensemble drives BOTH the rainfall cell and the icon's rain, so the
    // icon always agrees with the number shown in the column. HRRR is the first
    // ensemble member (it carries the other table columns too).
    const others = ensByTime[times[i]] || {};
    const members = [{ name: 'HRRR', v: pr[i] }]
      .concat(ENS_MODELS.map(m => ({ name: m.name, v: others[m.name] })));
    const ens = ensemble(members);
    const synth = ens ? ens.val : 0;

    const eff = effectiveCloud(ccL[i], ccM[i], ccH[i], pr[i], wc[i]);
    const cb = cloudBand(eff);
    const rb = rainBand(synth);
    const isDay = day[i] === 1;
    const iconKey = pickIcon(cb, rb, isDay, wc[i]);

    const tr = document.createElement('tr');
    if (rowsShown === 0) tr.className = 'now';
    tr.innerHTML =
      `<td class="cell-hour">${hourBand(ts)}</td>` +
      `<td class="cell-temp">${tempDisplay(temp[i])}</td>` +
      `<td class="cell-sky">${ICONS[iconKey]}</td>` +
      rainTd(ens) +
      `<td class="cell-wind">${windIcon(wd[i], Math.round(ws[i]))}</td>`;
    tbody.appendChild(tr);
    rowsShown++;
  }

  if (rowsShown === 0) {
    status.textContent = 'No forecast hours in window.';
    status.style.display = '';
    table.style.display = 'none';
  } else {
    status.style.display = 'none';
    table.style.display = '';
  }
}

/* ===================== Long-press rain readout ===================== */
/* Hold a rain cell to reveal the raw HRRR & GFS values behind the synthesis.
   The box is pinned top-center (far from a thumb pressing a table row) and
   vanishes the instant the finger lifts. Delegated to #rows so it survives
   re-renders. */
(function () {
  const rows = document.getElementById('rows');
  const box  = document.getElementById('rainInfo');
  let timer = null, sx = 0, sy = 0;
  const MOVE_TOL = 28;   // px of finger wander allowed before dismissing

  function pt(e) { return (e.touches && e.touches[0]) || (e.changedTouches && e.changedTouches[0]) || e; }
  function show(td) {
    // data-ens = "HRRR 2.5|GFS 1.2|JMA 0.0|..." ; data-val = blended result
    const lines = td.dataset.ens.split('|').map(p => {
      const i = p.lastIndexOf(' ');
      return `<div><b>${p.slice(0, i)}</b><span>${p.slice(i + 1)}</span></div>`;
    }).join('');
    box.innerHTML = `<div class="ri-grid">${lines}</div>` +
      `<div class="ri-blend"><b>Blend</b><span>${td.dataset.val} mm</span></div>`;
    box.style.display = 'block';
  }
  function hide() {
    clearTimeout(timer);
    box.style.display = 'none';
  }
  function start(e) {
    const td = e.target.closest('.cell-rain');
    if (!td || td.dataset.ens == null) return;   // empty (dry) cells carry no data
    const p = pt(e); sx = p.clientX; sy = p.clientY;
    clearTimeout(timer);
    timer = setTimeout(() => show(td), 350);     // long-press threshold
  }
  function move(e) {
    const p = pt(e);
    // Only dismiss on a real drag/scroll; ignore the small wander of a held thumb.
    if (Math.hypot(p.clientX - sx, p.clientY - sy) > MOVE_TOL) hide();
  }

  rows.addEventListener('touchstart', start, { passive: true });
  rows.addEventListener('touchend',   hide,  { passive: true });
  rows.addEventListener('touchcancel',hide,  { passive: true });
  rows.addEventListener('touchmove',  move,  { passive: true });
  // Desktop fallback for testing: press-and-hold with the mouse.
  rows.addEventListener('mousedown',  start);
  rows.addEventListener('mouseup',    hide);
  rows.addEventListener('mouseleave', hide);
})();

/* ===================== Radar map ===================== */
/* A full-screen NWS-style radar snapshot (RainViewer tiles on a light CARTO
   base), locked to the exact center/zoom of the user's radar.weather.gov link.
   Only the latest frame is shown. A bottom-right arrow shows where precip drifts
   in 30 minutes (RADAR.projSec): precip velocity is cross-correlated between the
   latest frame and one ~20 min earlier (public radar updates ~every 10 min) and
   scaled to the projection window. */
(function () {
  const RADAR = {
    center: [40.596, -73.994],   // [lat, lon] — decoded from the link's settings
    zoom: 8.1788126,             // decoded zoom (fractional; zoomSnap:0)
    color: 6,                    // RainViewer palette: 6 = NEXRAD Level-III (NWS-like)
    Z: 7,                        // integer analysis zoom (RainViewer radar maxzoom = 7)
    WIN: 400,                    // analysis window (px) around center
    D: 80,                       // downsampled correlation grid (D×D)
    maxSpeed: 36,                // m/s (~80 mph) cap on plausible storm motion
    minCoverage: 0.004,          // <0.4% precip pixels in view ⇒ "nothing nearby"
    confMin: 0.35,               // min normalized-correlation peak to trust a vector
    projSec: 1800,               // arrow length = how far precip drifts in this long (30 min)
    stationaryM: 1500,           // <1.5 km of projected drift ⇒ treat as stationary
  };

  const view     = document.getElementById('radarView');
  const btn      = document.getElementById('radarBtn');
  const closeBtn = document.getElementById('radarClose');
  const msgEl    = document.getElementById('radarMsg');
  const arrowSvg = document.getElementById('radarArrow');
  let map = null, radarLayer = null;

  btn.addEventListener('click', open);
  closeBtn.addEventListener('click', () => view.classList.remove('open'));
  // Refresh the frame when returning to a still-open radar view.
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && view.classList.contains('open')) loadRadar();
  });

  function open() {
    view.classList.add('open');
    if (!map) initMap();
    loadRadar();
    // The container just became visible at full size — flush layout, then let
    // Leaflet remeasure so it tiles the whole viewport (fixes first-open sizing).
    requestAnimationFrame(() => map.invalidateSize());
  }

  function initMap() {
    map = L.map('radarMap', {
      center: RADAR.center, zoom: RADAR.zoom, zoomSnap: 0,
      zoomControl: false, attributionControl: true,
      // Locked snapshot — no pan/zoom (faithful to the link).
      dragging: false, scrollWheelZoom: false, doubleClickZoom: false,
      touchZoom: false, boxZoom: false, keyboard: false, tap: false,
    });
    map.attributionControl.setPosition('bottomleft');   // away from the arrow
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      subdomains: 'abcd', maxZoom: 19,
      attribution: '© OSM © CARTO · radar © RainViewer',
    }).addTo(map);
    window.__radarMap = map;   // debug hook
  }

  async function loadRadar() {
    setMsg('Loading radar…');
    hideArrow();
    try {
      const r = await fetch('https://api.rainviewer.com/public/weather-maps.json');
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const data = await r.json();
      const past = (data.radar && data.radar.past) || [];
      if (!past.length) throw new Error('no frames');
      const host = data.host;
      const latest = past[past.length - 1];
      if (radarLayer) map.removeLayer(radarLayer);
      radarLayer = L.tileLayer(
        `${host}${latest.path}/256/{z}/{x}/{y}/${RADAR.color}/1_1.png`,
        // RainViewer radar data caps at zoom 7; upscale it for the locked ~8.18 view.
        { opacity: 0.75, crossOrigin: 'anonymous', maxNativeZoom: 7, maxZoom: 19 }
      ).addTo(map);
      setMsg('');
      // Motion estimate is best-effort; a failure must not blank the map.
      computeArrow(host, past).catch(e => { console.warn('radar arrow:', e); });
    } catch (e) {
      setMsg('Radar unavailable: ' + e.message);
    }
  }

  /* ---- Web Mercator helpers (256-px tiles) ---- */
  function lonLatToGlobalPixel(lon, lat, z) {
    const n = 256 * Math.pow(2, z);
    const x = (lon + 180) / 360 * n;
    const latRad = lat * Math.PI / 180;
    const y = (1 - Math.asinh(Math.tan(latRad)) / Math.PI) / 2 * n;
    return { x, y };
  }
  function resMeters(z, lat) {                 // ground meters per pixel
    return 156543.03392 * Math.cos(lat * Math.PI / 180) / Math.pow(2, z);
  }
  function loadImg(url) {
    return new Promise((res, rej) => {
      const img = new Image();
      img.crossOrigin = 'anonymous';           // CORS — required to read pixels
      img.onload = () => res(img);
      img.onerror = rej;
      img.src = url;
    });
  }

  /* Composite one radar frame over the analysis window, reduce to a D×D
     intensity mask. Returns [Float32Array(D*D), coverageFraction]. */
  async function frameMask(host, frame) {
    const { Z, WIN, D, color } = RADAR;
    const c = lonLatToGlobalPixel(RADAR.center[1], RADAR.center[0], Z);
    const originX = c.x - WIN / 2, originY = c.y - WIN / 2;
    const canvas = document.createElement('canvas');
    canvas.width = WIN; canvas.height = WIN;
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const n = Math.pow(2, Z);
    const tx0 = Math.floor(originX / 256), tx1 = Math.floor((originX + WIN - 1) / 256);
    const ty0 = Math.floor(originY / 256), ty1 = Math.floor((originY + WIN - 1) / 256);
    const jobs = [];
    for (let tx = tx0; tx <= tx1; tx++) {
      for (let ty = ty0; ty <= ty1; ty++) {
        if (ty < 0 || ty >= n) continue;
        const txw = ((tx % n) + n) % n;
        const url = `${host}${frame.path}/256/${Z}/${txw}/${ty}/${color}/1_1.png`;
        const dx = tx * 256 - originX, dy = ty * 256 - originY;
        jobs.push(loadImg(url)
          .then(img => ctx.drawImage(img, dx, dy))
          .catch(() => {}));            // missing tile = no echo there
      }
    }
    await Promise.all(jobs);
    const px = ctx.getImageData(0, 0, WIN, WIN).data;
    const mask = new Float32Array(D * D);
    const bs = WIN / D;
    let covCount = 0;
    for (let y = 0; y < WIN; y++) {
      const cy = Math.min(D - 1, (y / bs) | 0);
      for (let x = 0; x < WIN; x++) {
        const a = px[(y * WIN + x) * 4 + 3];
        if (a > 40) {
          const cx = Math.min(D - 1, (x / bs) | 0);
          mask[cy * D + cx] += a / 255;
          covCount++;
        }
      }
    }
    return [mask, covCount / (WIN * WIN)];
  }

  /* Best integer shift (dx east+, dy south+) aligning newer frame B onto older
     frame A — i.e. the displacement precip travelled. Uncentered normalized
     cross-correlation over the overlapping region; peak score = confidence. */
  function estimateShift(B, A, D, maxShift) {
    let best = -Infinity, bdx = 0, bdy = 0;
    for (let dy = -maxShift; dy <= maxShift; dy++) {
      for (let dx = -maxShift; dx <= maxShift; dx++) {
        let s = 0, eA = 0, eB = 0;
        for (let i = 0; i < D; i++) {
          const ai = i - dy; if (ai < 0 || ai >= D) continue;
          for (let j = 0; j < D; j++) {
            const aj = j - dx; if (aj < 0 || aj >= D) continue;
            const b = B[i * D + j], a = A[ai * D + aj];
            s += b * a; eA += a * a; eB += b * b;
          }
        }
        const norm = Math.sqrt(eA * eB);
        const score = norm > 0 ? s / norm : 0;
        if (score > best) { best = score; bdx = dx; bdy = dy; }
      }
    }
    return { dx: bdx, dy: bdy, conf: best };
  }

  async function computeArrow(host, past) {
    hideArrow();
    if (past.length < 2) { setMsg('Motion unavailable'); return; }
    const latest = past[past.length - 1];
    const prev = past[Math.max(0, past.length - 3)];   // ~20 min earlier (2 steps)
    const dt = latest.time - prev.time;                // seconds
    if (dt <= 0) { setMsg('Motion unavailable'); return; }

    const [maskA, covA] = await frameMask(host, prev);
    const [maskB, covB] = await frameMask(host, latest);
    if (Math.max(covA, covB) < RADAR.minCoverage) { setMsg('— no precipitation nearby —'); return; }

    const cell = RADAR.WIN / RADAR.D;
    const maxFull = (RADAR.maxSpeed * dt) / resMeters(RADAR.Z, RADAR.center[0]);
    const maxShift = Math.max(1, Math.min(RADAR.D - 1, Math.ceil(maxFull / cell)));
    const sh = estimateShift(maskB, maskA, RADAR.D, maxShift);
    if (sh.conf < RADAR.confMin) { setMsg('— precip motion uncertain —'); return; }

    const distM = Math.hypot(sh.dx, sh.dy) * cell * resMeters(RADAR.Z, RADAR.center[0]);
    const proj = (distM / dt) * RADAR.projSec;         // metres precip drifts in projSec (30 min)
    window.__radarLast = { shift: sh, dt, proj, covA, covB };  // debug hook
    if (proj < RADAR.stationaryM) { setMsg('— precip ≈ stationary —'); return; }

    drawArrow(Math.atan2(sh.dy, sh.dx), proj);
  }

  /* The tip is pinned to zip 10065 (the forecast location, COORDS); the shaft is
     drawn upwind so the tip lands exactly on 10065 for any magnitude/direction.
     Length is true-to-map-scale at the locked display zoom. Butt caps + an apex-
     anchored halo head ⇒ nothing ever pokes past the tip. */
  function drawArrow(angRad, projM) {
    if (!map) return;
    const tip = map.latLngToContainerPoint([COORDS.lat, COORDS.lon]);
    const len = projM / resMeters(RADAR.zoom, RADAR.center[0]);   // px on the live map
    const ux = Math.cos(angRad), uy = Math.sin(angRad);
    const tailX = tip.x - ux * len, tailY = tip.y - uy * len;
    const headLen = Math.min(19, Math.max(13, len * 0.52));
    const spread = 0.46;                                          // arrowhead half-angle
    const blX = tip.x - headLen * Math.cos(angRad - spread), blY = tip.y - headLen * Math.sin(angRad - spread);
    const brX = tip.x - headLen * Math.cos(angRad + spread), brY = tip.y - headLen * Math.sin(angRad + spread);
    // The shaft stops short of the apex (tucked under the wide part of the head) so
    // only the triangle's sharp point defines the tip — no flat shaft edge pokes out.
    const neck = headLen * 0.85;
    const nX = tip.x - ux * neck, nY = tip.y - uy * neck;
    const shaft = len > neck + 1
      ? `<line x1="${tailX}" y1="${tailY}" x2="${nX}" y2="${nY}" stroke="#000" stroke-width="5" stroke-linecap="butt"/>`
      : '';
    const size = map.getSize();
    arrowSvg.setAttribute('viewBox', `0 0 ${size.x} ${size.y}`);
    arrowSvg.innerHTML = shaft +
      `<polygon points="${tip.x},${tip.y} ${blX},${blY} ${brX},${brY}" fill="#000"/>`;
    arrowSvg.style.display = 'block';
    setMsg('');
  }

  function setMsg(t) { msgEl.textContent = t; msgEl.style.display = t ? 'block' : 'none'; if (t) hideArrow(); }
  function hideArrow() { arrowSvg.style.display = 'none'; }

  // Debug hooks for verification (deterministic test of the motion math).
  window.__radar = { estimateShift, resMeters, lonLatToGlobalPixel, frameMask, computeArrow, loadRadar, drawArrow };
})();

/* ===================== Boot ===================== */
updateTempHeader();   // reflect persisted unit on first paint
refresh();
setInterval(refresh, REFRESH_MS);
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) refresh();
});
</script>
